name: Bancolombia Assistant CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest

    env:
      GOOGLE_API_KEY: "dummy_key_for_testing"
      DATA_DIR: "./data"
      DB_PATH: "./chroma_banco_db"
      # pytest.ini define pythonpath = src, pero lo dejamos aquí también
      # para compatibilidad con herramientas que no lean pytest.ini
      PYTHONPATH: "${{ github.workspace }}/src"

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias de test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linter (Ruff)
        run: |
          pip install ruff
          # E = errores de estilo, F = errores lógicos, I = imports
          # --format=github integra los errores en la UI de Pull Requests
          python -m ruff check . --select=E,F --ignore=E501 --output-format=github

      - name: Ejecutar Pruebas (Pytest) con Cobertura
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  docker-build-check:
    name: Docker Validation
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verificar Build de Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # Solo validamos el build, no pusheamos a ningún registry
          tags: bancolombia-assistant:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
